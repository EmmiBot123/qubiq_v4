<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML/CSS Learning Lab | CBSE Syllabus</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap"
        rel="stylesheet">
</head>

<body class="dark-theme">
    <div class="app-container">
        <!-- Sidebar removed per user request -->


        <!-- Main Workspace -->
        <main class="workspace">
            <header class="workspace-header">
                <div class="topic-info">
                    <h2 id="current-topic-title">Select a Topic</h2>
                </div>
                <div class="actions">
                    <button id="run-btn" class="btn primary">Run Code ⚡</button>
                </div>
            </header>

            <div class="editor-section">
                <!-- Code Editor Area -->
                <div class="editor-container">
                    <div class="editor-header">
                        <span>index.html</span>
                    </div>
                    <div class="editor-wrapper">
                        <textarea id="code-editor" spellcheck="false" placeholder="Write your HTML here..."></textarea>
                        <div id="autocomplete-list" class="autocomplete-suggestions"></div>
                    </div>
                </div>

                <!-- Live Preview Area -->
                <div class="preview-container">
                    <div class="preview-header">
                        <span>Live Preview</span>
                    </div>
                    <iframe id="live-preview"></iframe>
                </div>
            </div>
        </main>
    </div>

    <script src="syllabus.js"></script>
    <script src="script.js"></script>
</body>

</html>
