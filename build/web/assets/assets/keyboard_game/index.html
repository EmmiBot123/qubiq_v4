<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learn to Type: Balloon Pop</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="game-container">
        <div id="ui-layer">
            <div class="stat-box">
                <span class="stat-label">Score</span>
                <span id="score" class="stat-value">0</span>
            </div>
            <div class="stat-box">
                <span class="stat-label">Lives</span>
                <span id="lives" class="stat-value">❤️❤️❤️</span>
            </div>
        </div>
        
        <div id="start-screen" class="overlay">
            <div class="modal">
                <div class="bounce-wrapper">
                    <h1>Balloon Pop! 🎈</h1>
                </div>
                <p>Welcome to the keyboard game!</p>
                <p>Pop the floating balloons by typing the letters inside them on your keyboard.</p>
                <div class="instruction-keys">
                    <span class="key">A</span>
                    <span class="key">B</span>
                    <span class="key">C</span>
                </div>
                <button id="start-btn" class="primary-btn">Play Now!</button>
            </div>
        </div>

        <div id="game-over-screen" class="overlay hidden">
            <div class="modal">
                <h1>Game Over! 😢</h1>
                <p>You popped a lot of balloons!</p>
                <p class="final-score-text">Final Score: <span id="final-score">0</span></p>
                <button id="restart-btn" class="primary-btn">Try Again</button>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
